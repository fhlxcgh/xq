name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p 22 ${{ vars.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        run: |
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='node_modules' \
              --exclude='.gitignore' \
              --exclude='*.md' \
              -czf - . | ssh -o StrictHostKeyChecking=no -p 22 ${{ vars.SERVER_USER }}@${{ vars.SERVER_IP }} "mkdir -p /var/www/blog && rm -rf /var/www/blog/* && tar -xzf - -C /var/www/blog"

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no -p 22 ${{ vars.SERVER_USER }}@${{ vars.SERVER_IP }} "ls -la /var/www/blog && echo '=== 部署验证完成 ==='"
