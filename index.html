<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国象棋人机对战</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="board-panel">
        <header class="topbar">
          <h1>中国象棋</h1>
          <p id="status" class="status">红方先行</p>
        </header>
        <div id="board" class="board" aria-label="中国象棋棋盘"></div>
      </section>

      <aside class="sidebar">
        <section class="card controls">
          <label class="field">
            <span>难度</span>
            <select id="difficulty">
              <option value="easy">初级</option>
              <option value="medium" selected>中级</option>
              <option value="hard">高级</option>
            </select>
          </label>
          <div class="actions">
            <button id="restart-btn" type="button">重新开始</button>
            <button id="undo-btn" type="button">悔棋</button>
          </div>
        </section>

        <section class="card history-card">
          <h2>走棋历史</h2>
          <ol id="history-list" class="history-list"></ol>
        </section>
      </aside>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
